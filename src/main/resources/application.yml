spring:
  profiles:
    active: local     # change to "cloud" to switch to Cloudinary

  datasource:
    url: jdbc:mysql://localhost:3306/code_review_db
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        format_sql: true

  data:
      redis:
        host: ${REDIS_HOST}
        port: ${REDIS_PORT}
        username: default
        password: ${REDIS_PASSWORD}
        ssl:
          enabled: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "http://localhost:8080/oauth2/callback/google"
            scope:
              - email
              - profile

          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "http://localhost:8080/oauth2/callback/github"
            scope:
              - user:email
              - read:user

        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: id

  web:
    resources:
      static-locations: file:${app.storage.local.base-path}/

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: >
          com.capstoneproject.codereviewsystem.kafka.events
    listener:
      concurrency: 1
      missing-topics-fatal: false
    admin:
      fail-fast: false        # don't crash on startup if Kafka broker is unreachable

  mvc:
    async:
      request-timeout: 1800000

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

  otp:
    expiry-minutes: 10
  admin:
    name: Super Admin
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}

  base-url: http://localhost:8080

  storage:

    local:
      base-path: uploads                   
      public-url: http://localhost:8080

    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME}
      api-key: ${CLOUDINARY_API_KEY}
      api-secret: ${CLOUDINARY_API_SECRET}
  
  analytics:
    health-check-interval-ms: 900000
    threshold:
      success-rate: 80.0
      error-rate: 15.0
      latency-ms: 10000
      cost-spike-multiplier: 3.0
      rate-limit-count: 20
      timeout-count: 20
  encryption:
    secret-key : ${ENCRYPTION_SECRET_KEY}

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
    com.capstoneproject: DEBUG